services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile # Temporary placeholder, usually frontend has its own
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: npm run dev
